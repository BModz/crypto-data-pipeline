name: Daily crypto pipeline

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC every day
  workflow_dispatch:        # also allows manual runs from the GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Write dlt secrets
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: uv run python scripts/write_secrets.py

      - name: Run pipeline
        run: uv run python pipeline.py

      - name: Write dbt keyfile
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: echo "$GCP_SERVICE_ACCOUNT_KEY" > /tmp/gcp-key.json

      - name: Run dbt
        env:
          DBT_PROFILES_DIR: /tmp/dbt
        run: |
          mkdir -p /tmp/dbt
          cat > /tmp/dbt/profiles.yml << 'EOF'
          crypto_pipeline:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: crypto-pipeline-dev
                dataset: crypto_transformed
                keyfile: /tmp/gcp-key.json
                threads: 1
                timeout_seconds: 300
          EOF
          cd transform && uv run dbt run
