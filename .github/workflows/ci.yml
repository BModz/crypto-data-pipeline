name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest tests/ -v

      - name: Write dbt keyfile
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: echo "$GCP_SERVICE_ACCOUNT_KEY" > /tmp/gcp-key.json

      - name: Run dbt test
        env:
          DBT_PROFILES_DIR: /tmp/dbt
        run: |
          mkdir -p /tmp/dbt
          cat > /tmp/dbt/profiles.yml << 'EOF'
          crypto_pipeline:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: crypto-pipeline-dev
                dataset: crypto_transformed
                keyfile: /tmp/gcp-key.json
                threads: 1
                timeout_seconds: 300
          EOF
          cd transform && uv run dbt test
